apiVersion: apps/v1
kind: Deployment
metadata:
  name: openenv-deployment
  labels:
    app: openenv
spec:
  replicas: 3
  selector:
    matchLabels:
      app: openenv
  template:
    metadata:
      labels:
        app: openenv
    spec:
      containers:
      - name: openenv
        image: openenv/openenv:latest
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: openenv-service
spec:
  selector:
    app: openenv
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
